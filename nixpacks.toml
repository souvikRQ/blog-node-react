# nixpacks.toml — monorepo root
# Railway reads this when Root Directory = / (repo root)

[phases.setup]
nixPkgs = ["nodejs_20"]
cmds = ["corepack enable && corepack prepare pnpm@10.28.2 --activate"]

[phases.install]
# Install all workspace packages from the root where pnpm-lock.yaml lives
cmds = ["pnpm install --frozen-lockfile"]

# Build + Start phases are intentionally left out here.
# Configure them per-service in the Railway dashboard:
#
# --- API service ---
# Build Command:  pnpm --filter @blog/shared-types build && pnpm --filter @blog/shared-schemas build && pnpm --filter @blog/api build
# Start Command:  node apps/api/dist/index.js
#
# --- Web service ---
# Build Command:  pnpm --filter @blog/shared-types build && pnpm --filter @blog/shared-schemas build && pnpm --filter @blog/web build
# Start Command:  npx serve apps/web/dist -l $PORT --no-clipboard
