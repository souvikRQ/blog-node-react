revolte:
  version: '1.0'
  project: Revolte Test
  appName: Blog Node React
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    testSuite:
      command: npm run test
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: main
      codeReview: true
      testSuite: true
      services:
        rid_2:
          type: WEB_APP
          name: web-app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              MONGO_URI: >-
                mongodb+srv://souvikghosh_db_user:OYcO3xBCUrPiFXsw@react-node-based-blog-s.oihu01c.mongodb.net/?appName=react-node-based-blog-site
              PORT: '8080'
              JWT_SECRET: jwt-token-for-the-secrets
              JWT_EXPIRES_IN: 7d
              VITE_API_URL: http://localhost:8080/api
