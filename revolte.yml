revolte:
  version: '1.0'
  project: Revolte Test
  appName: Blog Node React
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    testSuite:
      command: npm run test
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: main
      codeReview: true
      testSuite: true
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              MONGO_URI: >-
                mongodb+srv://souvikghosh_db_user:OYcO3xBCUrPiFXsw@react-node-based-blog-s.oihu01c.mongodb.net/?appName=react-node-based-blog-site
              PORT: '8080'
              JWT_SECRET: jwt-token-for-the-secrets
              JWT_EXPIRES_IN: 7d
              VITE_API_URL: http://localhost:8080/api
          specifications:
            cpu: 2
            memory: 1
            storage: 30
    qa:
      branch: main
      codeReview: true
      testSuite: true
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              MONGO_URI: >-
                mongodb+srv://souvikghosh_db_user:OYcO3xBCUrPiFXsw@react-node-based-blog-s.oihu01c.mongodb.net/?appName=react-node-based-blog-site
              PORT: '8080'
              JWT_SECRET: jwt-token-for-the-secrets
              JWT_EXPIRES_IN: 7d
              VITE_API_URL: http://localhost:8080/api
          specifications:
            cpu: 2
            memory: 1
            storage: 30
    production:
      branch: main
      codeReview: true
      testSuite: true
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              MONGO_URI: >-
                mongodb+srv://souvikghosh_db_user:OYcO3xBCUrPiFXsw@react-node-based-blog-s.oihu01c.mongodb.net/?appName=react-node-based-blog-site
              PORT: '8080'
              JWT_SECRET: jwt-token-for-the-secrets
              JWT_EXPIRES_IN: 7d
              VITE_API_URL: http://localhost:8080/api
          specifications:
            cpu: 2
            memory: 1
            storage: 30
            autoScaling:
              replica:
                min: 1
                max: 1
              utilization:
                cpu:
                  target: 70
                memory:
                  target: 70
              behavior:
                scaleDown:
                  stabilizationWindow: 300
